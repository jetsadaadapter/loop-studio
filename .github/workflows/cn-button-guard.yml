name: cn / Button guard

# Fires only when the highest-blast-radius UI files change. cn() (src/lib/utils.ts)
# feeds every Button variant and ~48 UI modules; the shared primitives under
# src/components/ui/** are imported everywhere. A change here must not silently
# alter class output or button rendering, so we run the unit safety net plus the
# Button visual-regression baseline before the PR can merge.
on:
  pull_request:
    paths:
      - "src/lib/utils.ts"
      - "src/components/ui/**"
      - "tests/visual/**"
      - "playwright.config.ts"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - ".github/workflows/cn-button-guard.yml"
  workflow_dispatch: {}

# A newer push to the same PR cancels the in-flight run.
concurrency:
  group: cn-button-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit safety net (cn + Button + utils)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # >=22: several @scalar/* deps require Node 22 (EBADENGINE on 20), and
          # the committed package-lock.json is resolved under Node 22 / npm 11.
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest suite
        run: npm test

  visual:
    name: Visual regression (Button gallery)
    runs-on: ubuntu-latest
    # Same image used to generate the *-chromium-linux.png baselines, so font
    # rendering and the bundled Chromium match the committed screenshots exactly.
    # Keep this tag in lockstep with the @playwright/test version in package.json.
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    env:
      # playwright.config.ts already reads CI to disable reuseExistingServer and
      # enable forbidOnly; GitHub sets CI=true automatically, but we make it explicit.
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Button gallery visual regression
        # webServer in playwright.config.ts boots `npm run dev` (NODE_ENV=development),
        # which is required because /dev/component-gallery is gated to non-production.
        run: npx playwright test tests/visual/

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
