name: Deploy ADT Library

on:
  push:
    branches: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_STORE_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_STORE_API_BASE_URL }}
          NEXT_PUBLIC_ZT_CALLBACK_PATH: ${{ secrets.NEXT_PUBLIC_ZT_CALLBACK_PATH }}
          NEXT_PUBLIC_ZT_DEBUG_CALLBACK: "false"

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: ".next,public,package.json,next.config.*"
          target: "/home/administrator/adt-library"
          strip_components: 0
          overwrite: true

      - name: Restart App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            #!/bin/bash
            set -e

            # Load NVM if it exists
            if [ -d "$HOME/.nvm" ]; then
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            fi

            cd /home/administrator/adt-library

            # Write environment file
            cat > .env << 'EOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            ALLOWED_EMAIL_DOMAIN=${{ secrets.ALLOWED_EMAIL_DOMAIN }}
            NODE_ENV=production
            NEXT_PUBLIC_STORE_API_BASE_URL=${{ secrets.NEXT_PUBLIC_STORE_API_BASE_URL }}
            NEXT_PUBLIC_ZT_CALLBACK_PATH=${{ secrets.NEXT_PUBLIC_ZT_CALLBACK_PATH }}
            NEXT_PUBLIC_ZT_DEBUG_CALLBACK=false
            EOF

            # Install production dependencies only
            npm install --omit=dev

            # Find PM2
            PM2_PATH=$(which pm2 2>/dev/null || echo "$HOME/.nvm/versions/node/$(node -v)/bin/pm2")

            # Restart or start
            if $PM2_PATH list | grep -q "adt-library"; then
              echo "Restarting existing process..."
              $PM2_PATH restart adt-library
            else
              echo "Starting new process..."
              $PM2_PATH start npm --name adt-library -- start
            fi

            $PM2_PATH save
            $PM2_PATH list

            echo "✅ Deployment completed!"